<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ferry - ペアリング</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: #fff;
        }
        .subtitle {
            color: #888;
            margin-bottom: 32px;
        }
        .status {
            background: #16213e;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .status-text {
            font-size: 1.1rem;
            margin-bottom: 12px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: #0078d4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 16px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .session-info {
            background: #0f3460;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .session-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 4px;
        }
        .session-id {
            font-family: monospace;
            font-size: 0.75rem;
            word-break: break-all;
            color: #888;
        }
        .check-mark {
            font-size: 1.2rem;
            color: #51cf66;
            margin-right: 8px;
        }
        #qrReader {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .scan-hint {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 16px;
        }
        .btn {
            background: #0078d4;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 32px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
        }
        .btn:hover { background: #106ebe; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        .error { color: #ff6b6b; }
        .success { color: #51cf66; font-size: 1.2rem; margin-bottom: 12px; }
        .paired-names { color: #ccc; font-size: 0.95rem; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ferry</h1>
        <p class="subtitle">P2P ファイル転送ペアリング</p>

        <div class="status" id="statusPanel">
            <p class="status-text" id="statusText">セッション情報を取得中…</p>
            <div class="spinner" id="spinner"></div>
        </div>

        <!-- 1 台目のセッション情報 -->
        <div class="session-info hidden" id="sessionAInfo">
            <p><span class="check-mark">✓</span>1 台目の PC</p>
            <p class="session-name" id="sessionAName"></p>
            <p class="session-id" id="sessionAId"></p>
        </div>

        <!-- 2 台目の QR スキャンエリア -->
        <div class="hidden" id="scanPanel">
            <p class="scan-hint">2 台目の PC に表示されている QR コードにカメラを向けてください</p>
            <div id="qrReader"></div>
        </div>

        <!-- ペアリング完了 -->
        <div class="hidden" id="pairedPanel">
            <p class="success">✓ ペアリング完了</p>
            <p class="paired-names" id="pairedNames"></p>
            <p style="color: #888; font-size: 0.85rem; margin-top: 16px;">このページを閉じてください</p>
        </div>

        <!-- エラー表示 -->
        <div class="hidden" id="errorPanel">
            <p class="error" id="errorText"></p>
            <button class="btn" onclick="location.reload()">再試行</button>
        </div>
    </div>

    <!-- Firebase SDK (v9 compat) — Auth 不要 -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

    <!-- html5-qrcode ライブラリ（ページ内カメラで 2 台目の QR を読み取る） -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <script src="bridge.js"></script>
</body>
</html>
